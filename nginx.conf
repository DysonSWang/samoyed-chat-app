# 萨摩耶聊天应用 - Nginx 配置示例
# 使用方法：
# 1. 安装 nginx: apt install nginx
# 2. 复制配置：cp nginx.conf /etc/nginx/sites-available/samoyed-chat
# 3. 启用配置：ln -s /etc/nginx/sites-available/samoyed-chat /etc/nginx/sites-enabled/
# 4. 测试配置：nginx -t
# 5. 重启 nginx: systemctl restart nginx

server {
    listen 80;
    server_name _;  # 或填写你的域名

    # 前端静态文件（生产环境构建后）
    location / {
        proxy_pass http://localhost:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 后端 API 代理
    location /api {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket 支持
    location /socket.io {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
