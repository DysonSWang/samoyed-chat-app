name: Debug Build - 萨摩耶之恋

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        working-directory: ./client
        run: npm ci

      - name: Build Frontend
        working-directory: ./client
        run: npm run build

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          log-verbosity: verbose

      - name: Install Capacitor
        working-directory: ./client
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          echo "Capacitor version:"
          npx cap --version

      - name: Remove existing android directory
        working-directory: ./client
        run: |
          echo "Before rm:"
          ls -la
          rm -rf android
          echo "After rm:"
          ls -la

      - name: Add Android Platform (fresh) with debug
        working-directory: ./client
        run: |
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "Java version: $(java -version 2>&1)"
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          echo "Adding Android platform..."
          npx cap add android 2>&1 || {
            echo "ERROR: cap add android failed"
            echo "Checking android directory:"
            ls -la android 2>&1 || echo "android dir does not exist"
            exit 1
          }
          echo "Android platform added successfully"
          ls -la android/

      - name: Sync Capacitor
        working-directory: ./client
        run: |
          echo "Syncing..."
          npx cap sync android 2>&1
          echo "Sync complete"

      - name: Build Debug APK
        working-directory: ./client/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: samoyed-chat-app-debug
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
