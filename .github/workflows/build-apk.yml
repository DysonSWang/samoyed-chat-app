name: Build Android APK - 萨摩耶之恋

on:
  push:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Dependencies
        working-directory: ./client
        run: npm ci

      - name: Build Frontend
        working-directory: ./client
        run: npm run build
        continue-on-error: false

      - name: Fix Capacitor Java Version
        working-directory: ./client
        run: |
          echo "🔧 修复 Capacitor Java 版本要求..."
          
          CAP_FILE="node_modules/@capacitor/android/capacitor/build.gradle"
          if [ -f "$CAP_FILE" ]; then
            sed -i 's/VERSION_21/VERSION_17/g' "$CAP_FILE"
            sed -i 's/VERSION21/VERSION17/g' "$CAP_FILE"
            sed -i "s/= '21'/= '17'/g" "$CAP_FILE"
            sed -i 's/sourceCompatibility JavaVersion.VERSION_21/sourceCompatibility JavaVersion.VERSION_17/g' "$CAP_FILE"
            sed -i 's/targetCompatibility JavaVersion.VERSION_21/targetCompatibility JavaVersion.VERSION_17/g' "$CAP_FILE"
            echo "✓ Fixed: $CAP_FILE"
          fi
          
          echo "✅ Java 版本修复完成"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android Platform
        working-directory: ./client
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: ./client
        run: npx cap sync android

      - name: Setup gradle.properties
        working-directory: ./client/android
        run: |
          cat > gradle.properties << 'EOF'
          org.gradle.java.home=/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/21.0.10-7/x64
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF
          echo "✓ Created gradle.properties"
          cat gradle.properties

      - name: Build Debug APK
        working-directory: ./client/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: samoyed-chat-app-debug
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
