name: Build Android APK - 萨摩耶之恋

on:
  push:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./client
        run: npm ci

      - name: Build Frontend
        working-directory: ./client
        run: npm run build

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        working-directory: ./client
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Add/Sync Android Platform
        working-directory: ./client
        run: |
          if [ -d "android" ]; then
            echo "Android platform exists, syncing..."
            npx cap sync android
          else
            echo "Adding Android platform..."
            npx cap add android
          fi

      - name: Sync Capacitor
        working-directory: ./client
        run: npx cap sync android

      - name: Build Debug APK
        working-directory: ./client/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: samoyed-chat-debug
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
